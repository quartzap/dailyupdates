name: Daily GenAI Digest

concurrency:
  group: daily-genai-digest
  cancel-in-progress: false

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"
      timezone: "Asia/Kolkata"

jobs:
  run-digest:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install audio tooling
        run: |
          python -m pip install --disable-pip-version-check edge-tts==7.2.8 reportlab==4.4.9
          sudo apt-get update
          sudo apt-get install -y espeak-ng ffmpeg

      - name: Run daily digest
        env:
          GENAI_REPORT_FROM: ${{ secrets.GENAI_REPORT_FROM }}
          GENAI_REPORT_TO: ${{ secrets.GENAI_REPORT_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
          DIGEST_TIMEZONE: Asia/Kolkata
          AUDIO_ENABLED: "true"
          AUDIO_VOICE: en-IN-NeerjaNeural
          AUDIO_RATE: "+0%"
          AUDIO_SPEED: "160"
          SOCIAL_PLATFORMS: x
          SOCIAL_MAX_ITEMS_PER_CATEGORY: "3"
        run: python main.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet --exit-code; then
            echo "No state changes to commit."
            exit 0
          fi
          git add state
          git commit -m "chore: update sent digest state [skip ci]"
          git push
